name: CI Pipeline
 
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
 
jobs:
  ci:
    name: Checkout → Build → Test
    runs-on: ubuntu-latest
 
    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
 
      # 2. (Optional) Set up a language runtime — adjust or remove as needed
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
 
      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci
 
      # 4. Build
      - name: Build
        run: npm run build --if-present
 
      # 5. Test
      - name: Run tests
        run: npm test